<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesas — Boda S&J</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        /* ── Mesas-specific ── */
        .mesas-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .mesas-header__title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .mesas-header__actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-action--gold { background: #C9A96E; color: white; }
        .btn-action--gold:hover { background: #A8884C; }
        .btn-action--outline { background: white; color: #666; border: 1.5px solid #ddd; }
        .btn-action--outline:hover { border-color: #C9A96E; color: #C9A96E; }
        .btn-action--danger { background: white; color: #e74c3c; border: 1.5px solid #fdd; }
        .btn-action--danger:hover { background: #fef0f0; }

        /* Guest pool (unassigned) */
        .guest-pool {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            min-height: 80px;
        }

        .guest-pool__title {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 12px;
        }

        .guest-pool__list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 40px;
        }

        /* Guest chip (draggable) */
        .guest-chip {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #C9A96E, #E8D5B0);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: grab;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
        }

        .guest-chip:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(201, 169, 110, 0.4);
        }

        .guest-chip:active { cursor: grabbing; }

        .guest-chip.dragging {
            opacity: 0.5;
            transform: scale(0.9);
        }

        .guest-chip__tooltip {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: #2C2C2C;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 400;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .guest-chip:hover .guest-chip__tooltip { opacity: 1; }

        /* Tables area */
        .tables-area {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .table-slot {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            text-align: center;
            transition: box-shadow 0.3s;
            min-height: 200px;
        }

        .table-slot.drag-over {
            box-shadow: 0 0 0 3px #C9A96E, 0 8px 30px rgba(201,169,110,0.2);
        }

        .table-slot__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .table-slot__name {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .table-slot__count {
            font-size: 0.75rem;
            color: #999;
        }

        .table-slot__delete {
            background: none;
            border: none;
            cursor: pointer;
            color: #ccc;
            padding: 4px;
            transition: color 0.2s;
        }

        .table-slot__delete:hover { color: #e74c3c; }

        .table-slot__seats {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            min-height: 56px;
            padding: 8px;
            border: 2px dashed #eee;
            border-radius: 12px;
            transition: border-color 0.3s;
        }

        .table-slot.drag-over .table-slot__seats {
            border-color: #C9A96E;
            background: #C9A96E08;
        }

        .table-slot__empty {
            color: #ccc;
            font-size: 0.8rem;
            padding: 16px;
        }

        /* Remove button on seated chip */
        .guest-chip--seated {
            position: relative;
        }

        .guest-chip__remove {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e74c3c;
            color: white;
            border: 2px solid white;
            font-size: 10px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .guest-chip:hover .guest-chip__remove { opacity: 1; }

        /* Generate modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal__title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            margin-bottom: 16px;
        }

        .modal__input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0dcd5;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            text-align: center;
            outline: none;
            margin-bottom: 16px;
        }

        .modal__input:focus { border-color: #C9A96E; }

        .modal__btns { display: flex; gap: 10px; justify-content: center; }
    </style>
</head>
<body>
    <script>
        if (!localStorage.getItem('admin_auth')) window.location.href = 'index.html';
    </script>

    <nav class="admin-nav">
        <div class="admin-nav__brand">S & J <span>Admin</span></div>
        <div class="admin-nav__links">
            <a href="dashboard.html" class="admin-nav__link">Dashboard</a>
            <a href="invitados.html" class="admin-nav__link">Invitados</a>
            <a href="simulacion.html" class="admin-nav__link">Simulación</a>
            <a href="mesas.html" class="admin-nav__link admin-nav__link--active">Mesas</a>
            <a href="#" id="logout-btn" class="admin-nav__link admin-nav__link--logout">Salir</a>
        </div>
    </nav>

    <main class="admin-main">
        <div class="mesas-header">
            <h2 class="mesas-header__title">Gestión de Mesas</h2>
            <div class="mesas-header__actions">
                <button class="btn-action btn-action--outline" id="btn-generate">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                    Generar invitados ficticios
                </button>
                <button class="btn-action btn-action--gold" id="btn-add-table">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Añadir mesa
                </button>
            </div>
        </div>

        <!-- Unassigned guests -->
        <div class="guest-pool" id="guest-pool">
            <div class="guest-pool__title">Invitados sin asignar (<span id="unassigned-count">0</span>)</div>
            <div class="guest-pool__list" id="pool-list"></div>
        </div>

        <!-- Tables grid -->
        <div class="tables-area" id="tables-area"></div>
    </main>

    <!-- Generate modal -->
    <div class="modal-overlay" id="generate-modal">
        <div class="modal">
            <h3 class="modal__title">Generar invitados ficticios</h3>
            <p style="font-size:0.9rem;color:#666;margin-bottom:16px;">
                Se crearán invitados de prueba para simular la asignación de mesas.
            </p>
            <input type="number" class="modal__input" id="generate-count" value="70" min="1" max="200" placeholder="Cantidad">
            <div class="modal__btns">
                <button class="btn-action btn-action--outline" id="generate-cancel">Cancelar</button>
                <button class="btn-action btn-action--gold" id="generate-confirm">Generar</button>
            </div>
        </div>
    </div>

    <script src="../js/budget-bar.js"></script>
    <script src="../js/mesas.js"></script>
</body>
</html>
