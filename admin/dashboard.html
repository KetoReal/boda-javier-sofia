<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Boda S&J</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <!-- Auth check -->
    <script>
        if (!localStorage.getItem('admin_auth')) window.location.href = 'index.html';
    </script>

    <nav class="admin-nav">
        <div class="admin-nav__brand">S & J <span>Admin</span></div>
        <div class="admin-nav__links">
            <a href="dashboard.html" class="admin-nav__link admin-nav__link--active">Dashboard</a>
            <a href="invitados.html" class="admin-nav__link">Invitados</a>
            <a href="simulacion.html" class="admin-nav__link">Simulación</a>
            <a href="mesas.html" class="admin-nav__link">Mesas</a>
            <a href="#" id="logout-btn" class="admin-nav__link admin-nav__link--logout">Salir</a>
        </div>
    </nav>

    <main class="admin-main">
        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-card__icon" style="background:#C9A96E22;color:#C9A96E;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                </div>
                <div class="stat-card__value" id="stat-total">0</div>
                <div class="stat-card__label">Confirmados</div>
            </div>
            <div class="stat-card">
                <div class="stat-card__icon" style="background:#7D8C6C22;color:#7D8C6C;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                </div>
                <div class="stat-card__value" id="stat-bus">0</div>
                <div class="stat-card__label">En autobús</div>
            </div>
            <div class="stat-card">
                <div class="stat-card__icon" style="background:#F5E6E022;color:#C9A96E;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
                </div>
                <div class="stat-card__value" id="stat-allergies">0</div>
                <div class="stat-card__label">Con alergias</div>
            </div>
        </div>

        <!-- Charts row -->
        <div class="charts-grid">
            <div class="chart-card">
                <h3 class="chart-card__title">Menús elegidos</h3>
                <div class="chart-bars" id="menu-chart"></div>
            </div>
            <div class="chart-card">
                <h3 class="chart-card__title">Transporte</h3>
                <div class="chart-bars" id="transport-chart"></div>
            </div>
        </div>

        <!-- Guest table -->
        <div class="table-card">
            <div class="table-card__header">
                <h3 class="table-card__title">Invitados confirmados</h3>
                <button class="btn-export" id="export-csv">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Exportar CSV
                </button>
            </div>
            <div class="table-responsive">
                <table class="guests-table">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Autobús</th>
                            <th>Menú</th>
                            <th>Alergias</th>
                            <th>Estado</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="guests-tbody"></tbody>
                </table>
            </div>
            <p class="table-empty" id="table-empty" style="display:none;">No hay invitados confirmados todavía.</p>
        </div>
    </main>

    <script src="../js/budget-bar.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
